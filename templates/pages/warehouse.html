<div
class="section"
id="warehouse-section"
>

    <div class="card">

        <div class="section-title">
            📦 Склад
        </div>

        <div
        style="
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:10px;
        margin-top:15px;
        "
        >

            <div class="stat-card">

                <div id="warehouse-products">
                    0
                </div>

                <small>
                    Товаров
                </small>

            </div>

            <div class="stat-card">

                <div id="warehouse-stock">
                    0 ₽
                </div>

                <small>
                    Остаток
                </small>

            </div>

            <div class="stat-card">

                <div id="warehouse-profit">
                    0 ₽
                </div>

                <small>
                    Прибыль
                </small>

            </div>

        </div>

    </div>

    <div class="card">

        <input

        id="warehouse-search"

        type="text"

        placeholder="Поиск товара..."

        style="
        width:100%;
        padding:12px;
        border:none;
        border-radius:12px;
        margin-bottom:12px;
        "

        />

        <button

        onclick="openAddProduct()"

        class="action-btn"

        style="width:100%;"

        >

            ➕ Добавить товар

        </button>

    </div>

    <div
    id="warehouse-list"
    >
    </div>

</div>
